<!DOCTYPE html>
<!-- Define HTML5 -->

<html lang="en">
<!-- Início do documento -->

<head>
    <!-- Configurações -->

    <meta charset="UTF-8">
    <!-- Permite acentos -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Responsividade -->

    <title>Document</title>
    <!-- Título da aba -->

</head>

<body style="background-color: #1e1e1e;">
<!-- Cor de fundo da página inteira -->

    <h1 style="background-color: black; color: aqua; font-family: 'Franklin Gothic Medium'; font-size: 30px; text-align: center;">
        Título Principal
    </h1>
    <!-- Usa todas as propriedades:
         background-color → fundo preto
         color → cor do texto
         font-family → fonte
         font-size → tamanho
         text-align → centralizado -->

    <h2 style="background-color: #333; color: lightgreen; font-family: Arial; font-size: 26px; text-align: left;">
        Subtítulo
    </h2>
    <!-- Alinhado à esquerda -->

    <h3 style="background-color: #444; color: white; font-family: Verdana; font-size: 22px; text-align: right;">
        Seção
    </h3>
    <!-- Alinhado à direita -->

    <h4 style="background-color: #555; color: yellow; font-family: Tahoma; font-size: 20px; text-align: center;">
        Sub-seção
    </h4>
    <!-- Centralizado novamente -->

    <h5 style="background-color: #666; color: pink; font-family: Courier New; font-size: 18px; text-align: left;">
        Detalhe
    </h5>

    <h6 style="background-color: #777; color: orange; font-family: Georgia; font-size: 16px; text-align: right;">
        Observação
    </h6>

    <P style="background-color: #222; color: white; font-family: Arial; font-size: 14px; text-align: justify;">
        Este é um parágrafo de exemplo usando todas as propriedades de estilo básico diretamente na tag.
        Aqui você consegue ver cores, fonte, tamanho e alinhamento funcionando juntos.
    </P>
    <!-- Parágrafo com texto justificado -->

</body>

</html>
