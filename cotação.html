
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citações e Abreviações</title>
</head>

<body>

    <h1>Elementos de Citação e Abreviação</h1>

    <p>
        <abbr title="HyperText Markup Language">HTML</abbr>
        <!-- <abbr> define uma abreviação -->
        <!-- O atributo title mostra o significado ao passar o mouse -->
        <!-- Boa prática: sempre usar title para explicar a sigla -->
    </p>

    <address>
        Rua Exemplo, 123<br>
        Cidade - País<br>
        Email: exemplo@email.com
    </address>
    <!-- <address> define informações de contato -->
    <!-- Normalmente usado para autor ou dono do site -->
    <!-- Boa prática: usar apenas para informações reais de contato -->

    <p>
        Texto normal
        <bdo dir="rtl">Texto invertido</bdo>
    </p>
    <!-- <bdo> controla a direção do texto -->
    <!-- dir="rtl" significa "right to left" (direita para esquerda) -->
    <!-- Boa prática: útil para idiomas como árabe ou hebraico -->

    <blockquote>
        Este é um exemplo de citação longa retirada de outra fonte.
    </blockquote>
    <!-- <blockquote> representa uma citação em bloco -->
    <!-- Geralmente vem com recuo automático -->
    <!-- Boa prática: usar quando o texto é longo e vem de outra fonte -->

    <p>
        Como dizia:
        <q>A simplicidade é o último grau de sofisticação.</q>
    </p>
    <!-- <q> define uma citação curta -->
    <!-- O navegador geralmente adiciona aspas automaticamente -->

    <p>
        <cite>Dom Casmurro</cite> é uma obra famosa.
    </p>
    <!-- <cite> define o título de uma obra -->
    <!-- Pode ser livro, filme, música, etc -->
    <!-- Boa prática: não usar para nomes de pessoas -->

</body>

</html>
